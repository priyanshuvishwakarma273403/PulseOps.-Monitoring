server:
  port: 8083

spring:
  application:
    name: monitoring-service
  datasource:
    url: jdbc:mysql://localhost:3306/pulseops?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

pulseops:
  jwt:
    secret: pulseopsSecretKeyPulseOpsSecretKeyPulseOpsSecretKey
