server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: monitoring-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/monitors/**
        - id: alert-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/alerts/**, /api/v1/incidents/**
        - id: websocket-service
          uri: ws://localhost:8086
          predicates:
            - Path=/ws/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
  redis:
    host: localhost
    port: 6379

pulseops:
  jwt:
    secret: pulseopsSecretKeyPulseOpsSecretKeyPulseOpsSecretKey
