version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: pulseops-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: pulseops
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pulseops-network

  # Redis Cache
  redis:
    image: redis:7.0-alpine
    container_name: pulseops-redis
    ports:
      - "6379:6379"
    networks:
      - pulseops-network

  # Kafka Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: pulseops-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - pulseops-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: pulseops-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - pulseops-network

  # API Gateway Service
  api-gateway:
    build: ../pulseops-backend/api-gateway
    container_name: pulseops-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      PULSEOPS_JWT_SECRET: pulseopsSecretKeyPulseOpsSecretKeyPulseOpsSecretKey
    depends_on:
      - redis
    networks:
      - pulseops-network

  # Authentication Service
  auth-service:
    build: ../pulseops-backend/auth-service
    container_name: pulseops-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pulseops?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      PULSEOPS_JWT_SECRET: pulseopsSecretKeyPulseOpsSecretKeyPulseOpsSecretKey
    depends_on:
      - mysql
      - redis
    networks:
      - pulseops-network

  # Monitoring Service
  monitoring-service:
    build: ../pulseops-backend/monitoring-service
    container_name: pulseops-monitoring
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pulseops?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PULSEOPS_JWT_SECRET: pulseopsSecretKeyPulseOpsSecretKeyPulseOpsSecretKey
    depends_on:
      - mysql
      - kafka
    networks:
      - pulseops-network

  # Alert & Incident Service
  alert-service:
    build: ../pulseops-backend/alert-service
    container_name: pulseops-alert
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pulseops?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PULSEOPS_JWT_SECRET: pulseopsSecretKeyPulseOpsSecretKeyPulseOpsSecretKey
    depends_on:
      - mysql
      - kafka
    networks:
      - pulseops-network

  # WebSocket Service
  websocket-service:
    build: ../pulseops-backend/websocket-service
    container_name: pulseops-websocket
    ports:
      - "8086:8086"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PULSEOPS_JWT_SECRET: pulseopsSecretKeyPulseOpsSecretKeyPulseOpsSecretKey
    depends_on:
      - kafka
    networks:
      - pulseops-network

networks:
  pulseops-network:
    driver: bridge

volumes:
  mysql-data:
